name: MyHear Auto Update

# 매일 한국시간 오전 9시 (UTC 0시) 자동 실행
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  update-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # GitHub에 커밋할 권한
    
    steps:
      # 1. 저장소 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 2. Python 환경 설정
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # 3. 필요한 라이브러리 설치
      - name: Install dependencies
        run: |
          pip install anthropic google-api-python-client requests
      
      # 4. 자동 업데이트 스크립트 실행
      - name: Run auto-update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python .github/scripts/auto_update.py
      
      # 5. 변경사항이 있으면 자동 커밋
      - name: Commit changes
        run: |
          git config --local user.email "myhear-bot@myhear.co.kr"
          git config --local user.name "MyHear AI Bot"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 자동 업데이트: YouTube 인기 영상 반영 ($(date +'%Y-%m-%d %H:%M'))" && git push)
